# Boots the Toolshop SUT from upstream prebuilt images, pinned to release 2.3.
# Upstream: https://github.com/testsmith-io/practice-software-testing (docker-compose.prod.yml)
# Boot + wait + DB seed in one step: `bash scripts/sut-up.sh` (CI uses the same script).
# Switch variant with SPRINT (e.g. SPRINT=sprint5-with-bugs for defect hunting). Default: sprint5.
name: toolshop

services:
  laravel-api:
    image: testsmith/practice-software-testing-${SPRINT:-sprint5}-api:2.3
    environment:
      - 'PHP_OPCACHE_VALIDATE_TIMESTAMPS=1'
      - 'DB_PORT=3306'
      - 'DB_HOST=mariadb'
      - 'host=localhost'
      - 'DISABLE_LOGGING=false'
    volumes:
      - laravel-app-code:/var/www
    depends_on:
      mariadb:
        condition: service_healthy

  angular-ui:
    image: testsmith/practice-software-testing-${SPRINT:-sprint5}-ui:2.3
    ports:
      - '4200:4200'
    command: bash -c "ng serve --host 0.0.0.0 --port 4200"

  web:
    # upstream's prebuilt web image is arm64-only — built here from files vendored
    # out of upstream tag 2.3 (see docker/web/Dockerfile)
    build: docker/web
    ports:
      - '8091:80'
    depends_on:
      - laravel-api

  mariadb:
    image: yobasystems/alpine-mariadb:10.6.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: toolshop
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 5s
      timeout: 3s
      retries: 24

volumes:
  laravel-app-code:
