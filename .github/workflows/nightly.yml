# Nightly full regression + performance + published report — see docs/CI-CD.md.
name: Nightly Regression

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  full-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: bash scripts/sut-up.sh
      - run: npx playwright test tests/ui --project=${{ matrix.browser }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.browser }}
          path: test-results/

  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - run: bash scripts/sut-up.sh
      - run: k6 run tests/performance/login.smoke.js
      # TODO(M4): swap smoke for load profiles with p95 thresholds

  # TODO(M3): job to merge results → build Allure → deploy to GitHub Pages
